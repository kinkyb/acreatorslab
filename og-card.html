<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    background: #0e0e0e;
    font-family: 'DM Mono', monospace;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Noise */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1;
  }

  /* Red glow */
  body::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -55%);
    width: 900px; height: 560px;
    background: radial-gradient(ellipse, rgba(200,16,46,0.13) 0%, transparent 65%);
    pointer-events: none;
    z-index: 0;
  }

  .card {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 0 80px;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    font-size: 11px;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: #c8102e;
    margin-bottom: 32px;
  }
  .eyebrow::before, .eyebrow::after {
    content: '';
    width: 32px; height: 1px;
    background: #c8102e;
    opacity: 0.4;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 108px;
    font-weight: 700;
    line-height: 0.88;
    letter-spacing: -4px;
    color: #fff;
    margin-bottom: 32px;
  }
  .logo .a { color: #c8102e; }
  .logo .rest { font-style: italic; font-weight: 400; }

  .tagline {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 22px;
    color: #e8e0d8;
    opacity: 0.75;
    line-height: 1.5;
    margin-bottom: 40px;
  }

  .pills {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .pill {
    font-size: 9px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #6b6259;
    border: 1px solid #252525;
    padding: 6px 16px;
  }

  /* Border frame */
  .frame {
    position: absolute;
    inset: 28px;
    border: 1px solid #252525;
    pointer-events: none;
    z-index: 0;
  }
  .frame::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent 10%, #c8102e 50%, transparent 90%);
    opacity: 0.5;
  }

  .domain {
    position: absolute;
    bottom: 52px;
    right: 60px;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #3d3530;
    z-index: 2;
  }
</style>
</head>
<body>
  <div class="frame"></div>
  <div class="card">
    <div class="eyebrow">Adult Creator Tools</div>
    <div class="logo"><span class="a">A</span><span class="rest">CreatorsLab</span></div>
    <p class="tagline">The complete toolkit for adult content creators.</p>
    <div class="pills">
      <span class="pill">AI Captions</span>
      <span class="pill">GIF Creation</span>
      <span class="pill">Image Tagging</span>
      <span class="pill">Video Tagging</span>
      <span class="pill">X Automation</span>
    </div>
  </div>
  <div class="domain">acreatorslab.com</div>
</body>
</html>
